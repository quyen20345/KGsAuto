services:
  neo4j:
    image: neo4j:2026.01.4
    container_name: kgsauto_neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - ${KGSAUTO_DOCKER_DATA_DIR:-./data/docker}/neo4j/data:/data
      - ${KGSAUTO_DOCKER_DATA_DIR:-./data/docker}/neo4j/logs:/logs
      - ${KGSAUTO_DOCKER_DATA_DIR:-./data/docker}/neo4j/plugins:/plugins
      - ${KGSAUTO_DOCKER_DATA_DIR:-./data/docker}/neo4j/conf:/conf
      - ./data/exports:/exports
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/12345678}
      NEO4JLABS_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_allowlist: apoc.*,gds.*
      NEO4J_dbms_security_procedures_unrestricted: apoc.*,gds.*
      NEO4J_apoc_export_file_enabled: "true"
      NEO4J_apoc_import_file_enabled: "true"
      NEO4J_apoc_import_file_use__neo4j__config: "false"
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p $${NEO4J_PASSWORD:-12345678} 'RETURN 1' >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 20
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.15.0
    container_name: kgsauto_qdrant
    ports:
      - "6333:6333"
    volumes:
      - ${KGSAUTO_DOCKER_DATA_DIR:-./data/docker}/qdrant/data:/qdrant/storage
    healthcheck:
      test: ["CMD", "bash", "-lc", "</dev/tcp/127.0.0.1/6333"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  graph_api:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: kgsauto_graph_api
    command: uvicorn apps.graph_api.main:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    environment:
      KGSAUTO_LOAD_DOTENV: "false"
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-12345678}
      QDRANT_URL: http://qdrant:6333
    depends_on:
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    restart: unless-stopped

  pipeline_api:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: kgsauto_pipeline_api
    command: uvicorn apps.pipeline_api.main:app --host 0.0.0.0 --port 8001
    ports:
      - "8001:8001"
    volumes:
      - ./data:/app/data
      - ./mocktest:/app/mocktest
    env_file:
      - .env
    environment:
      KGSAUTO_LOAD_DOTENV: "false"
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-12345678}
      QDRANT_URL: http://qdrant:6333
    depends_on:
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    restart: unless-stopped

  chat_api:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    container_name: kgsauto_chat_api
    command: uvicorn apps.chat_api.main:app --host 0.0.0.0 --port 8002
    ports:
      - "8002:8002"
    volumes:
      - ./data:/app/data
    env_file:
      - .env
    environment:
      KGSAUTO_LOAD_DOTENV: "false"
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-12345678}
      QDRANT_URL: http://qdrant:6333
    depends_on:
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: apps/frontend
      dockerfile: Dockerfile
      args:
        VITE_GRAPH_API_BASE_URL: /api/graph
        VITE_CHAT_API_BASE_URL: /api/chat
        VITE_PIPELINE_API_BASE_URL: /api/pipeline
    container_name: kgsauto_frontend
    ports:
      - "3000:80"
    depends_on:
      - graph_api
      - pipeline_api
      - chat_api
    restart: unless-stopped
