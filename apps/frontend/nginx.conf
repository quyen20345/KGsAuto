server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/graph/ {
        rewrite ^/api/graph/(.*)$ /$1 break;
        proxy_pass http://graph_api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/pipeline/ {
        rewrite ^/api/pipeline/(.*)$ /$1 break;
        proxy_pass http://pipeline_api:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/chat/ {
        rewrite ^/api/chat/(.*)$ /$1 break;
        proxy_pass http://chat_api:8002;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
